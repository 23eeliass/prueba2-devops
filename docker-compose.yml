services:
  frontend:
    build: ./front_despacho
    ports:
      - "3000:80" 
    networks:
      - duoc-network
    depends_on:
      - backend-ventas
      - backend-despachos

  backend-ventas:
    build: ./back-Ventas_SpringBoot
    ports:
      - "8080:8080"
    networks:
      - duoc-network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://base-datos:3306/duoc_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - DB_PORT=3306
    depends_on:
      - base-datos

  backend-despachos:
    build: ./back-Despachos_SpringBoot
    ports:
      - "8082:8082"
    networks:
      - duoc-network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://base-datos:3306/duoc_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - DB_PORT=3306
    depends_on:
      - base-datos

  base-datos:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: duoc_db
    ports:
      - "3306:3306"
    networks:
      - duoc-network
    volumes:
      - db_data:/var/lib/mysql 

networks:
  duoc-network:
    driver: bridge

volumes:
  db_data: