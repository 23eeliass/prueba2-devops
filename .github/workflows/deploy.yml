name: Pipeline CI/CD - Examen DevOps

on:
  push:
    branches: [ "main" ] 

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Iniciar sesión en el Registro Seguro (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Extremer metadatos (Etiquetas y Versiones)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }} / ${{ env.IMAGE_NAME }}

      - name: Construir y Subir imagen - Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest

      - name: Construir y Subir imagen - Backend Ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend-ventas:latest

      - name: Construir y Subir imagen - Backend Despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend-despachos:latest